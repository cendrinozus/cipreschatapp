# Configuration Apache pour le mode développement (WampServer)
#
# 1. Copier ce fichier :
#      C:\wamp64\bin\apache\apache2.4.65\conf\extra\cipreschatapp-dev.conf
#
# 2. Ajouter dans C:\wamp64\bin\apache\apache2.4.65\conf\httpd.conf
#    (juste après la ligne "Include conf/extra/httpd-vhosts.conf") :
#      Include conf/extra/cipreschatapp-dev.conf
#
# 3. Activer les modules proxy via l'icône WampServer dans la barre des tâches :
#      Clic gauche > Apache > Apache modules > cocher :
#        proxy_module, proxy_http_module, proxy_wstunnel_module
#    (mod_headers et mod_rewrite sont déjà actifs dans WampServer)
#
# 4. Ajouter cipreschatapp.local dans C:\Windows\System32\drivers\etc\hosts :
#      127.0.0.1   cipreschatapp.local
#
# 5. Redémarrer Apache depuis l'icône WampServer (Redémarrer tous les services)

<VirtualHost *:80>
    ServerName cipreschatapp.local

    # ── Frontend React (Vite dev server sur 3000) ─────────────────────────────
    ProxyPreserveHost On

    # WebSocket pour le Hot Module Replacement de Vite
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:3000/$1 [P,L]

    # API Flask — redirigé vers le backend (port 5000)
    ProxyPass        /api/ http://localhost:5000/api/
    ProxyPassReverse /api/ http://localhost:5000/api/

    # Tout le reste → React dev server
    ProxyPass        / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Headers CORS pour le dev
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"

    ErrorLog  "C:/wamp64/logs/cipreschatapp-error.log"
    CustomLog "C:/wamp64/logs/cipreschatapp-access.log" combined
</VirtualHost>
