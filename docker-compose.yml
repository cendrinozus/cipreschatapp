services:

  mysql:
    image: mysql:8.3
    container_name: cipres_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB:-chatbot_db}
      MYSQL_USER: ${MYSQL_USER:-chatbot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chatbot_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    container_name: cipres_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: cipres_backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-chatbot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chatbot_pass}
      MYSQL_DB: ${MYSQL_DB:-chatbot_db}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral-nemo}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      UPLOAD_FOLDER: /app/uploads
      CHROMA_PATH: /app/chroma_db
      EXTERNAL_API_URL: ${EXTERNAL_API_URL:-}
      EXTERNAL_API_TOKEN: ${EXTERNAL_API_TOKEN:-}
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_db
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: cipres_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/ssl/cipreschatapp:ro
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cipres_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
    ports:
      - "8181:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  ollama_data:
  uploads_data:
  chroma_data:
