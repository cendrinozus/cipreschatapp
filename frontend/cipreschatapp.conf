Listen 443

SSLSessionCache shmcb:/usr/local/apache2/logs/ssl_scache(512000)
SSLSessionCacheTimeout 300

<VirtualHost *:80>
    ServerName chatbot.lacipres.org
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName chatbot.lacipres.org

    SSLEngine on
    SSLCertificateFile    /etc/ssl/cipreschatapp/cipreschatapp.crt
    SSLCertificateKeyFile /etc/ssl/cipreschatapp/cipreschatapp.key

    DocumentRoot /usr/local/apache2/htdocs

    # ── Proxy vers Flask (API) ───────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyPass /api http://backend:5000/api
    ProxyPassReverse /api http://backend:5000/api

    # ── React Router SPA — toute requête non-API non-fichier → index.html ───
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]

    <Directory /usr/local/apache2/htdocs>
        Options -MultiViews
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
